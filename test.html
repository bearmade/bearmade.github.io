<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpenAI Text Completion Example</title>
</head>
<body>
  <h1>OpenAI Text Completion Example</h1>
  <p>Enter a prompt below:</p>
  <textarea id="prompt" rows="5"></textarea>
  <button id="generate">Generate Completion</button>
  <div id="completion"></div>

  <script>
    const API_KEY = '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';

    const generateButton = document.getElementById('generate');
    generateButton.addEventListener('click', generateCompletion);

    function generateCompletion() {
      const prompt = document.getElementById('prompt').value;
      const max_tokens = 50;
      const temperature = 0.5;

      fetch("https://api.openai.com/v1/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${API_KEY}`,
        },
        body: JSON.stringify({
          prompt,
          max_tokens,
          temperature,
        }),
      })
        .then((response) => response.json())
        .then((data) => {
          const completion = data.choices[0].text;
          const completionDiv = document.getElementById("completion");
          completionDiv.innerHTML = `<p>Completion:</p><p>${completion}</p>`;
        });
    }
  </script>
</body>
</html>
